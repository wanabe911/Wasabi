<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wasabi 追跡</title>
    <meta name="description" content="Wasabi 追跡 - Phone & Email Intelligence Tracker">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wasabi 追跡">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="splash" class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo-container">
                <div class="slash-line left-slash"></div>
                <img src="/icon-512.png" alt="Wasabi" class="splash-logo">
                <div class="slash-line right-slash"></div>
                <div class="katana-slice"></div>
            </div>
            <h1 class="splash-title">Wasabi<span class="splash-jp">追跡</span></h1>
            <p class="splash-sub">Phone & Email Intelligence</p>
            <div class="splash-loader"></div>
        </div>
    </div>

    <div class="bg-grid"></div>
    <div class="container" id="mainApp" style="display:none;">
        <header>
            <div class="top-bar">
                <div class="user-info">
                    <span class="user-dot"></span>
                    <span id="userName"></span> - <span id="userCity"></span>
                </div>
                <div class="top-right">
                    <div id="ipInfo" class="ip-info">Loading IP...</div>
                    <button class="install-btn hidden" id="installBtn" onclick="installApp()">Install App</button>
                    <button class="logout-btn" onclick="logout()">Keluar</button>
                </div>
            </div>
            <div class="logo">
                <span class="logo-icon">W</span>
                <div class="logo-text">
                    <h1>Wasabi<span class="jp">追跡</span></h1>
                    <p>Phone & Email Intelligence</p>
                </div>
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-number" id="statTotal">0</span>
                    <span class="stat-label">Total Data</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-number" id="statHighRisk">0</span>
                    <span class="stat-label">Resiko Tinggi</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-number" id="statToday">0</span>
                    <span class="stat-label">Hari Ini</span>
                </div>
            </div>
        </header>

        <div class="search-section">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Masukkan nomor HP atau alamat email..." autocomplete="off">
                <button id="searchBtn" onclick="startTracking()">
                    <span class="btn-text">Lacak</span>
                    <span class="btn-icon">追</span>
                </button>
            </div>
            <p class="hint">Contoh: +6281927995158 atau nama@email.com</p>
        </div>

        <div id="progress" class="progress hidden">
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <p class="progress-text">Menganalisis input...</p>
        </div>

        <div id="result" class="result hidden"></div>

        <div id="reportForm" class="report-form hidden">
            <div class="report-header">
                <h3>Laporkan Nomor Ini</h3>
                <button class="close-btn" onclick="document.getElementById('reportForm').classList.add('hidden')">&times;</button>
            </div>
            <input type="text" id="reportName" placeholder="Nama pemilik">
            <input type="text" id="reportLabels" placeholder="Label (contoh: Penipu, Phising)">
            <input type="text" id="reportLocation" placeholder="Lokasi (contoh: Jakarta Pusat)">
            <input type="text" id="reportNotes" placeholder="Catatan">
            <select id="reportRisk">
                <option value="RENDAH">Rendah</option>
                <option value="SEDANG">Sedang</option>
                <option value="TINGGI" selected>Tinggi</option>
            </select>
            <button onclick="submitReport()">Kirim Laporan</button>
        </div>

        <div id="history" class="history hidden">
            <div class="history-header">
                <h2>Pelacakan Terbaru</h2>
                <button class="export-btn" onclick="exportCSV()">Export CSV</button>
            </div>
            <div id="historyList"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
