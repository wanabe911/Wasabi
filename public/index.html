<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasabi 追跡</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">W</span>
                <div class="logo-text">
                    <h1>Wasabi<span class="jp">追跡</span></h1>
                    <p>Phone & Email Intelligence</p>
                </div>
            </div>
        </header>

        <div class="search-section">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Masukkan nomor HP atau alamat email..." autocomplete="off">
                <button id="searchBtn" onclick="startTracking()">
                    <span class="btn-text">Lacak</span>
                    <span class="btn-icon">追</span>
                </button>
            </div>
            <p class="hint">Contoh: +6281927995158 atau nama@email.com</p>
        </div>

        <div id="progress" class="progress hidden">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <p class="progress-text">Menganalisis input...</p>
        </div>

        <div id="result" class="result hidden"></div>

        <div id="history" class="history hidden">
            <h2>Pelacakan Terbaru</h2>
            <div id="historyList"></div>
        </div>

        <footer>
            <p>Powered by NumVerify | Abstract API | Veriphone | Supabase</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
